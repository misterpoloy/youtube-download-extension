name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python lint ───────────────────────────────
  python-lint:
    name: Python — Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ruff
        run: pip install ruff

      - name: Lint
        run: ruff check youtube_downloader/

  # ── Extension build ───────────────────────────
  extension-build:
    name: Extension — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: browser_extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-dist
          path: browser_extension/dist/
          retention-days: 7
